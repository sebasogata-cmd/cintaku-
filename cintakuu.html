<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Pacarku 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9ecf, #ff6fb5, #ff4da6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Glow Neon Effect */
.neon {
    color: white;
    text-shadow: 
        0 0 5px #fff,
        0 0 10px #ff4da6,
        0 0 20px #ff4da6,
        0 0 40px #ff1493;
}

/* Card */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 0 30px #ff4da6;
    animation: float 3s ease-in-out infinite;
}

/* Panda */
.panda {
    width: 150px;
    animation: bounce 2s infinite;
}

/* Animations */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    background: #ff1493;
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 15px #ff1493;
    transition: 0.3s;
}

button:hover {
    background: white;
    color: #ff1493;
    box-shadow: 0 0 25px white;
}
</style>
</head>

<body>

<div class="card">
    <img class="panda" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="Panda Lucu">
    <h1 class="neon">Hai Zahraaaa 💕</h1>
    <p class="neon">hallowww cayangkuuuu, kalauuu kamuuuu bukaaa 🐼<br>
     💗</p> Fileee iniii berartiii kamuuu oranggg palingg cantikkk seduniaaa, loveyouuuu</p>
    <button onclick="showLove()">Klik Disini 💖</button>
</div>

<script>
function showLove() {
    alert("Aku sayang kamu selamanyaaaaaaaa 💞✨");
}
</script>

</body>
</html>
